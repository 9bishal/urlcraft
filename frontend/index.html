<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URLCraft - URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        .message.show.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
            display: block;
        }

        .message.show.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
            display: block;
        }

        .auth-status {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            background: #f5f5f5;
        }

        .auth-status.logged-in {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .auth-status.logged-out {
            background: #ffebee;
            color: #c62828;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            background: none;
            border: none;
            font-size: 14px;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: #f0f0f0;
            color: #333;
            margin-left: 10px;
        }

        .button.secondary:hover {
            background: #e0e0e0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .button-group .button {
            flex: 1;
        }

        .section-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .url-list {
            list-style: none;
        }

        .url-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .url-code {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .url-original {
            color: #666;
            word-break: break-all;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .url-stats {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .url-actions {
            display: flex;
            gap: 8px;
        }

        .url-actions button {
            flex: 1;
            padding: 6px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .url-actions button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            padding: 10px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🔗 URLCraft</h1>
                <p>Secure URL Shortener with JWT Authentication</p>
            </div>

            <div class="content">
                <!-- Auth Status -->
                <div id="authStatus" class="auth-status logged-out">
                    ❌ Not logged in
                </div>

                <!-- Message -->
                <div id="message" class="message"></div>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('auth')">🔐 Auth</button>
                    <button class="tab" onclick="switchTab('shorten')">✂️ Shorten</button>
                    <button class="tab" onclick="switchTab('myurls')">📋 My URLs</button>
                </div>

                <!-- AUTH TAB -->
                <div id="auth" class="tab-content active">
                    <!-- Register Form -->
                    <div id="registerForm">
                        <div class="section-title">Create Account</div>
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="regUsername" placeholder="john_dev">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label>Password (min 8 chars)</label>
                            <input type="password" id="regPassword" placeholder="SecurePass123!">
                        </div>
                        <div class="button-group">
                            <button class="button" onclick="handleRegister()">Register</button>
                            <button class="button secondary" onclick="toggleAuthForm()">Login instead</button>
                        </div>
                    </div>

                    <!-- Login Form -->
                    <div id="loginForm" style="display: none;">
                        <div class="section-title">Login</div>
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="loginUsername" placeholder="john_dev">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="SecurePass123!">
                        </div>
                        <div class="button-group">
                            <button class="button" onclick="handleLogin()">Login</button>
                            <button class="button secondary" onclick="toggleAuthForm()">Register instead</button>
                        </div>
                    </div>

                    <!-- Logged In View -->
                    <div id="loggedInView" style="display: none;">
                        <div class="section-title">Session Info</div>
                        <div class="auth-status logged-in">
                            ✅ Logged in as <strong id="currentUsername"></strong>
                        </div>
                        <div class="button-group">
                            <button class="button" onclick="handleRefreshToken()">🔄 Refresh Token</button>
                            <button class="button secondary" onclick="handleLogout()">Logout</button>
                        </div>
                    </div>

                    <div class="loading" id="authLoading">⏳ Loading...</div>
                </div>

                <!-- SHORTEN TAB -->
                <div id="shorten" class="tab-content">
                    <div id="shortenGuard" style="display: none;">
                        <p style="color: #c62828; margin-bottom: 15px;">⚠️ Please login first</p>
                    </div>

                    <div id="shortenForm">
                        <div class="section-title">Create Short URL</div>
                        <div class="form-group">
                            <label>Long URL *</label>
                            <input type="url" id="longUrl" placeholder="https://example.com/very/long/url">
                        </div>
                        <div class="form-group">
                            <label>Custom Code (optional)</label>
                            <input type="text" id="customCode" placeholder="my-link">
                        </div>
                        <div class="form-group">
                            <label>Expires In (optional)</label>
                            <input type="text" id="expiresIn" placeholder="e.g., 24h, 7d, 30m">
                        </div>
                        <button class="button" onclick="handleShortenUrl()">Create Short URL</button>
                    </div>

                    <div id="shortenResult" style="display: none;">
                        <hr>
                        <div class="section-title">✅ Short URL Created!</div>
                        <div id="resultContent"></div>
                        <div class="button-group">
                            <button class="button" onclick="copyShortenUrl()">📋 Copy</button>
                            <button class="button secondary" onclick="resetShortenForm()">Create Another</button>
                        </div>
                    </div>

                    <div class="loading" id="shortenLoading">⏳ Creating...</div>
                </div>

                <!-- MY URLS TAB -->
                <div id="myurls" class="tab-content">
                    <div id="myUrlsGuard" style="display: none;">
                        <p style="color: #c62828; margin-bottom: 15px;">⚠️ Please login first</p>
                    </div>

                    <div id="myUrlsContent">
                        <div class="section-title">Your Short URLs</div>
                        <button class="button secondary" onclick="handleLoadMyUrls()">🔄 Load URLs</button>
                        <ul class="url-list" id="urlList">
                            <li style="color: #999; text-align: center; padding: 20px;">No URLs yet</li>
                        </ul>
                    </div>

                    <div class="loading" id="myUrlsLoading">⏳ Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        let accessToken = localStorage.getItem('accessToken');
        let refreshToken = localStorage.getItem('refreshToken');
        let username = localStorage.getItem('username');
        let currentShortUrl = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', updateAuthUI);

        // ==================== UTILITY FUNCTIONS ====================

        function showMessage(msg, type = 'info') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message show ' + type;
            setTimeout(() => {
                el.className = 'message';
            }, 4000);
        }

        function setLoading(tabId, show) {
            const el = document.getElementById(tabId + 'Loading');
            if (el) {
                el.classList.toggle('show', show);
            }
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

            // Show selected
            const tabEl = document.getElementById(tabName);
            if (tabEl) {
                tabEl.classList.add('active');
            }

            // Mark button as active
            event.target.classList.add('active');
        }

        // ==================== AUTH FUNCTIONS ====================

        function updateAuthUI() {
            const status = document.getElementById('authStatus');
            const regForm = document.getElementById('registerForm');
            const logForm = document.getElementById('loginForm');
            const loggedIn = document.getElementById('loggedInView');
            const shortenGuard = document.getElementById('shortenGuard');
            const shortenForm = document.getElementById('shortenForm');
            const myUrlsGuard = document.getElementById('myUrlsGuard');
            const myUrlsContent = document.getElementById('myUrlsContent');

            if (accessToken && username) {
                status.className = 'auth-status logged-in';
                status.textContent = `✅ Logged in as ${username}`;
                regForm.style.display = 'none';
                logForm.style.display = 'none';
                loggedIn.style.display = 'block';
                document.getElementById('currentUsername').textContent = username;
                shortenGuard.style.display = 'none';
                shortenForm.style.display = 'block';
                myUrlsGuard.style.display = 'none';
                myUrlsContent.style.display = 'block';
            } else {
                status.className = 'auth-status logged-out';
                status.textContent = '❌ Not logged in';
                regForm.style.display = 'block';
                logForm.style.display = 'none';
                loggedIn.style.display = 'none';
                shortenGuard.style.display = 'block';
                shortenForm.style.display = 'none';
                myUrlsGuard.style.display = 'block';
                myUrlsContent.style.display = 'none';
            }
        }

        function toggleAuthForm() {
            document.getElementById('registerForm').style.display =
                document.getElementById('registerForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('loginForm').style.display =
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
        }

        async function handleRegister() {
            const user = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;

            if (!user || !email || !pass) {
                showMessage('❌ All fields required', 'error');
                return;
            }

            setLoading('auth', true);
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    accessToken = data.accessToken;
                    refreshToken = data.refreshToken;
                    username = data.username;
                    localStorage.setItem('accessToken', accessToken);
                    localStorage.setItem('refreshToken', refreshToken);
                    localStorage.setItem('username', username);
                    showMessage('✅ Registration successful!', 'success');
                    updateAuthUI();
                } else {
                    showMessage('❌ ' + (data.error || 'Registration failed'), 'error');
                }
            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            } finally {
                setLoading('auth', false);
            }
        }

        async function handleLogin() {
            const user = document.getElementById('loginUsername').value.trim();
            const pass = document.getElementById('loginPassword').value;

            if (!user || !pass) {
                showMessage('❌ Username and password required', 'error');
                return;
            }

            setLoading('auth', true);
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    accessToken = data.accessToken;
                    refreshToken = data.refreshToken;
                    username = data.username;
                    localStorage.setItem('accessToken', accessToken);
                    localStorage.setItem('refreshToken', refreshToken);
                    localStorage.setItem('username', username);
                    showMessage('✅ Login successful!', 'success');
                    updateAuthUI();
                } else {
                    showMessage('❌ ' + (data.error || 'Login failed'), 'error');
                }
            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            } finally {
                setLoading('auth', false);
            }
        }

        async function handleRefreshToken() {
            if (!refreshToken) {
                showMessage('❌ No refresh token available', 'error');
                return;
            }

            setLoading('auth', true);
            try {
                const res = await fetch(`${API_BASE}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });
                const data = await res.json();

                if (res.ok) {
                    accessToken = data.accessToken;
                    localStorage.setItem('accessToken', accessToken);
                    showMessage('✅ Token refreshed!', 'success');
                } else {
                    showMessage('❌ ' + (data.error || 'Refresh failed'), 'error');
                }
            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            } finally {
                setLoading('auth', false);
            }
        }

        function handleLogout() {
            accessToken = null;
            refreshToken = null;
            username = null;
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('username');
            showMessage('✅ Logged out!', 'success');
            updateAuthUI();
        }

        // ==================== URL SHORTENING FUNCTIONS ====================

        async function handleShortenUrl() {
            if (!accessToken) {
                showMessage('❌ Please login first', 'error');
                return;
            }

            const longUrl = document.getElementById('longUrl').value.trim();
            const customCode = document.getElementById('customCode').value.trim();
            const expiresIn = document.getElementById('expiresIn').value.trim();

            if (!longUrl) {
                showMessage('❌ URL required', 'error');
                return;
            }

            setLoading('shorten', true);
            try {
                const body = { longUrl };
                if (customCode) body.customCode = customCode;
                if (expiresIn) body.expiresIn = expiresIn;

                const res = await fetch(`${API_BASE}/shorten`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    currentShortUrl = data.shortUrl;
                    let result = `<strong>${data.shortCode}</strong><br>`;
                    result += `<small>${data.shortUrl}</small><br>`;
                    if (data.expiresAt) {
                        result += `<small>Expires: ${new Date(data.expiresAt).toLocaleString()}</small>`;
                    }
                    document.getElementById('resultContent').innerHTML = result;
                    document.getElementById('shortenForm').style.display = 'none';
                    document.getElementById('shortenResult').style.display = 'block';
                    showMessage('✅ URL shortened!', 'success');
                } else {
                    showMessage('❌ ' + (data.error || 'Failed to shorten'), 'error');
                }
            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            } finally {
                setLoading('shorten', false);
            }
        }

        function copyShortenUrl() {
            navigator.clipboard.writeText(currentShortUrl).then(() => {
                showMessage('✅ Copied!', 'success');
            }).catch(() => {
                showMessage('❌ Could not copy', 'error');
            });
        }

        function resetShortenForm() {
            document.getElementById('longUrl').value = '';
            document.getElementById('customCode').value = '';
            document.getElementById('expiresIn').value = '';
            document.getElementById('shortenForm').style.display = 'block';
            document.getElementById('shortenResult').style.display = 'none';
        }

        // ==================== MY URLS FUNCTIONS ====================

        async function handleLoadMyUrls() {
            if (!accessToken) {
                showMessage('❌ Please login first', 'error');
                return;
            }

            setLoading('myurls', true);
            try {
                const res = await fetch(`${API_BASE}/my-urls`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();

                if (res.ok) {
                    const list = document.getElementById('urlList');
                    if (!data.urls || data.urls.length === 0) {
                        list.innerHTML = '<li style="color: #999; text-align: center; padding: 20px;">No URLs yet</li>';
                    } else {
                        list.innerHTML = data.urls.map(url => `
                            <li class="url-item">
                                <div class="url-code">🔗 ${url.shortCode}</div>
                                <div class="url-original">${url.originalUrl}</div>
                                <div class="url-stats">👁️ ${url.clicks || 0} clicks | 📅 ${new Date(url.createdAt).toLocaleDateString()}</div>
                                <div class="url-actions">
                                    <button onclick="openUrl('${url.shortCode}')">Visit</button>
                                    <button onclick="copyUrlToClip('${url.shortUrl}')">Copy</button>
                                    <button onclick="deleteUrl('${url.shortCode}')">Delete</button>
                                </div>
                            </li>
                        `).join('');
                    }
                } else {
                    showMessage('❌ ' + (data.error || 'Failed to load'), 'error');
                }
            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            } finally {
                setLoading('myurls', false);
            }
        }

        function openUrl(code) {
            window.open(`${API_BASE}/${code}`, '_blank');
        }

        function copyUrlToClip(url) {
            navigator.clipboard.writeText(url).then(() => {
                showMessage('✅ Copied!', 'success');
            });
        }

        async function deleteUrl(code) {
            if (!confirm('Delete this URL?')) return;

            try {
                const res = await fetch(`${API_BASE}/shorten/${code}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage('✅ Deleted!', 'success');
                    handleLoadMyUrls();
                } else {
                    showMessage('❌ ' + (data.error || 'Delete failed'), 'error');
                }
            } catch (err) {
                showMessage('❌ Error: ' + err.message, 'error');
            }
        }
    </script>
</body>
</html>
